# ============================================================
# 甲状腺超声 良恶性二分类 配置文件
# ============================================================

model:
  name: "./pretrained/medsiglip-448"      # 本地权重路径
  local_files_only: true                  # 仅从本地加载，不联网
  num_classes: 2                         # 2 = 二分类（良性/恶性）
  fine_tune_strategy: "partial"          # linear_probing | partial | full
  unfreeze_last_n: 6                     # 解冻最后 N 个 Transformer Block（仅 partial 模式生效）
  classifier_dropout: 0.1               # 分类头 dropout
  use_class_weights: true                # 是否使用类别权重处理不平衡

data:
  # 数据组织方式: folder-based
  #   data/thyroid_binary/
  #     train/
  #       benign/    (class 0)
  #       malignant/  (class 1)
  #     val/
  #       benign/
  #       malignant/
  #     test/
  #       benign/
  #       malignant/
  root_dir: "/mnt/wangbd8/workspace/DataSets/ThyroidAgent/train_val_test/Superimposed_multitask/dataset_3_cls"
  image_size: 448                        # 输入尺寸
  mean: [0.5, 0.5, 0.5]                # 归一化均值（灰度图三通道一致）
  std: [0.5, 0.5, 0.5]                  # 归一化标准差

  # 数据增强（仅训练集）
  augmentation:
    random_horizontal_flip: true         # 随机水平翻转
    random_rotation: 10                  # 随机旋转 ±10°
    random_brightness_contrast: 0.1     # 亮度/对比度抖动幅度
    random_affine_scale: [0.95, 1.05]   # 随机缩放范围

  num_workers: 4
  pin_memory: true

training:
  batch_size: 32
  epochs: 30
  learning_rate: 0.00005                 # partial/full: 1e-5~5e-5; linear_probing: 1e-3
  weight_decay: 0.01
  warmup_epochs: 3                       # 学习率预热轮数
  lr_scheduler: "cosine"                # cosine | step | plateau
  lr_min: 0.000001                       # cosine 最低 LR
  early_stopping_patience: 7             # 早停耐心值（val loss 不降则停）
  gradient_accumulation_steps: 1         # 梯度累积步数
  max_grad_norm: 1.0                     # 梯度裁剪
  mixed_precision: "fp16"               # no | fp16 | bf16
  label_smoothing: 0.0                   # 标签平滑（二分类可用 0.1）

  loss:
    name: "bce"                          # bce（BCEWithLogitsLoss）
    pos_weight: null                     # 正样本权重，null 则自动根据训练集比例计算

evaluation:
  metrics: ["auc_roc", "accuracy", "f1", "sensitivity", "specificity", "precision", "recall"]
  save_best_metric: "auc_roc"           # 根据哪个指标保存最佳模型
  mode: "max"                            # max: 越大越好; min: 越小越好

logging:
  log_dir: "logs/binary_cls"
  checkpoint_dir: "checkpoints/binary_cls"
  log_interval: 20                       # 每 N 步打印日志
  eval_interval: 1                       # 每 N 个 epoch 验证一次
  use_tensorboard: true
  save_top_k: 3                          # 保存最佳 K 个模型

seed: 42
device: "cuda"                          # cuda | cpu
